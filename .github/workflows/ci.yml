name: community-plugins

on:
  push:
    paths:
      - "src/**"
      - "tests/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - ".github/workflows/**"
  workflow_dispatch:

# Streamling release whose prebuilt binary + k3s setup scripts the e2e tests run
# against. Bump in lockstep with the streamling-e2e dependency in Cargo.toml.
env:
  STREAMLING_VERSION: v0.1.0

jobs:
  validate-and-test:
    runs-on: blacksmith-8vcpu-ubuntu-2204
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_CACHE_SIZE: "10G"
    steps:
      - uses: actions/checkout@v4
      - name: Configure Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
        with:
          components: clippy, rustfmt
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
      - name: Set SCCACHE_DIR env
        run: echo "SCCACHE_DIR=$RUNNER_TEMP/sccache" >> $GITHUB_ENV
      - name: Prepare sccache dir
        run: mkdir -p "$SCCACHE_DIR"
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-plugins-${{ runner.os }}-1.93.1-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sccache-plugins-${{ runner.os }}-1.93.1-
      - name: Setup rust cache
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: "community-plugins"
          cache-targets: true
          cache-on-failure: true
      - name: Run linters
        run: |
          cargo fmt --check
          cargo clippy --locked --all-targets -- -D warnings
      - uses: taiki-e/install-action@v2
        with:
          tool: nextest
      - name: Run tests
        run: cargo nextest run --locked --lib
        env:
          RUST_LOG: info
          CARGO_INCREMENTAL: 0
          CARGO_PROFILE_TEST_DEBUG: 0
        timeout-minutes: 15

  # ==========================================================================
  # Build the community plugins .so and fetch the streamling binary for e2e
  # ==========================================================================
  build-release:
    needs: [validate-and-test]
    runs-on: blacksmith-8vcpu-ubuntu-2204
    steps:
      - uses: actions/checkout@v4
      - name: Download streamling release binary
        run: |
          set -euo pipefail
          curl -fsSL -o streamling.tar.gz \
            "https://github.com/goldsky-io/streamling/releases/download/${STREAMLING_VERSION}/streamling-linux-x86_64.tar.gz"
          mkdir -p streamling-bin
          tar -xzf streamling.tar.gz -C streamling-bin
          chmod +x streamling-bin/streamling
      - name: Configure Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache
      - name: Set SCCACHE_DIR env
        run: echo "SCCACHE_DIR=$RUNNER_TEMP/sccache" >> $GITHUB_ENV
      - name: Prepare sccache dir
        run: mkdir -p "$SCCACHE_DIR"
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-release-${{ runner.os }}-${{ runner.arch }}-1.93.1-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sccache-release-${{ runner.os }}-${{ runner.arch }}-1.93.1-
      - name: Setup rust cache
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: "community-plugins-release"
          cache-targets: true
          cache-on-failure: true
      - name: Build community plugins
        run: cargo build --release --locked --lib
        env:
          CARGO_INCREMENTAL: 0
          RUSTC_WRAPPER: sccache
          SCCACHE_CACHE_SIZE: "10G"
          LIBZ_SYS_STATIC: 1
          PKG_CONFIG_ALL_STATIC: 1
      - name: Show sccache stats
        run: sccache --show-stats || true
      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-artifacts
          path: |
            streamling-bin/streamling
            target/release/libcommunity_plugins.so
          retention-days: 1
          if-no-files-found: error

  # ==========================================================================
  # Plugin-local e2e tests (reuses build-release artifacts, no recompilation)
  # ==========================================================================
  plugin-e2e:
    needs: [build-release]
    runs-on: blacksmith-8vcpu-ubuntu-2204
    env:
      RUSTC_WRAPPER: sccache
      SCCACHE_CACHE_SIZE: "10G"
    steps:
      - uses: actions/checkout@v4
      # k3s-setup.sh and its manifests live in the streamling repo at the same
      # release tag as the downloaded binary.
      - name: Checkout streamling
        uses: actions/checkout@v4
        with:
          repository: goldsky-io/streamling
          ref: ${{ env.STREAMLING_VERSION }}
          path: streamling
      # Download pre-built binaries from build-release job (no recompilation)
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: artifacts
      - name: Install release binaries
        run: |
          chmod +x artifacts/streamling-bin/streamling
          echo "E2E_STREAMLING_BIN=$GITHUB_WORKSPACE/artifacts/streamling-bin/streamling" >> $GITHUB_ENV
          echo "E2E_STREAMLING_DIR=$GITHUB_WORKSPACE/streamling/crates/streamling" >> $GITHUB_ENV
          echo "STREAMLING__PLUGIN__PATH=$GITHUB_WORKSPACE/artifacts/target/release/libcommunity_plugins.so" >> $GITHUB_ENV
      # Rust + caching (only for compiling the test binary, not streamling)
      - name: Configure Rust toolchain
        uses: dtolnay/rust-toolchain@1.93.1
      - name: Install sccache
        uses: taiki-e/install-action@v2
        with:
          tool: sccache,nextest
      - name: Set SCCACHE_DIR env
        run: echo "SCCACHE_DIR=$RUNNER_TEMP/sccache" >> $GITHUB_ENV
      - name: Prepare sccache dir
        run: mkdir -p "$SCCACHE_DIR"
      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-plugin-e2e-${{ runner.os }}-1.93.1-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            sccache-plugin-e2e-${{ runner.os }}-1.93.1-
      - name: Setup rust cache
        uses: useblacksmith/rust-cache@v3
        with:
          shared-key: "community-plugins-e2e"
          cache-targets: true
          cache-on-failure: true
      # Infrastructure
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Set up Docker Builder
        uses: useblacksmith/setup-docker-builder@v1
      - name: Install k3d
        run: curl -s https://raw.githubusercontent.com/k3d-io/k3d/main/install.sh | bash
      - name: Setup k3s cluster
        working-directory: streamling
        run: ./scripts/k3s-setup.sh
        timeout-minutes: 5
      # Run plugin e2e tests
      - name: Run plugin e2e tests
        run: |
          set -euo pipefail
          eval "$(cd streamling && ./scripts/k3s-setup.sh --env-only)"
          cargo nextest run --test '*'
        env:
          RUST_LOG: info
          CARGO_INCREMENTAL: 0
          CARGO_PROFILE_TEST_DEBUG: 0
        timeout-minutes: 10
